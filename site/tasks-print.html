<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Egg Hunt 2026 — Printable Task & Power-Up Cards</title>
    <link rel="stylesheet" href="css/tasks-print.css">
</head>
<body>

<!-- ===== SCREEN-ONLY HEADER ===== -->
<div class="screen-ui">
    <h1 id="printTitle"></h1>
    <p class="subtitle">Printable Task & Power-Up Cards</p>
    <div class="summary" id="printSummary"></div>
    <br><br>
    <button class="print-btn" onclick="window.print()">Print Cards</button>
</div>

<!-- Cards are generated dynamically from config -->
<div id="cardsContainer"></div>

<script src="js/nav.js"></script>
<script src="js/config.js"></script>
<script>
CONFIG.ready(function (cfg) {
    // ── Header ──
    document.getElementById('printTitle').textContent = 'Easter Egg Hunt ' + cfg.event.year;
    document.title = 'Easter Egg Hunt ' + cfg.event.year + ' — Printable Task & Power-Up Cards';

    var difficulties = ['easy', 'medium', 'hard', 'extreme'];
    var allCards = [];
    var taskCount = 0;

    // Collect all task cards
    difficulties.forEach(function (diff) {
        var group = cfg.tasks[diff];
        if (!group) return;
        group.items.forEach(function (desc) {
            taskCount++;
            allCards.push({
                type: 'task',
                difficulty: diff,
                reward: group.reward,
                rewardText: group.rewardText,
                stars: group.stars,
                description: desc
            });
        });
    });

    // Collect all power-up cards
    var powerupCount = cfg.powerups.length;
    cfg.powerups.forEach(function (pu) {
        allCards.push({
            type: 'powerup',
            name: pu.name,
            icon: pu.icon,
            description: pu.description
        });
    });

    // Update summary
    var totalCards = taskCount + powerupCount;
    document.getElementById('printSummary').textContent = taskCount + ' task cards + ' + powerupCount + ' power-up cards = ' + totalCards + ' total';

    // Render cards in pages of 12 (4 cols x 3 rows)
    var container = document.getElementById('cardsContainer');
    var cardsPerPage = 12;
    var pageCount = Math.ceil(allCards.length / cardsPerPage);

    for (var pageIdx = 0; pageIdx < pageCount; pageIdx++) {
        var start = pageIdx * cardsPerPage;
        var end = Math.min(start + cardsPerPage, allCards.length);
        var pageCards = allCards.slice(start, end);

        // Section label
        var label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = 'Page ' + (pageIdx + 1);
        container.appendChild(label);

        // Print page grid
        var pageDiv = document.createElement('div');
        pageDiv.className = 'print-page';

        pageCards.forEach(function (c) {
            var card = document.createElement('div');

            if (c.type === 'task') {
                card.className = 'card card-' + c.difficulty;

                var starsStr = '';
                for (var s = 0; s < c.stars; s++) starsStr += '\u2b50';

                var diffLabel = c.difficulty.charAt(0).toUpperCase() + c.difficulty.slice(1);

                card.innerHTML =
                    '<span class="deco-top-left">\ud83e\udd5a</span>' +
                    '<span class="deco-top-right">\ud83d\udc23</span>' +
                    '<span class="deco-bottom-left">\ud83d\udc30</span>' +
                    '<span class="deco-bottom-right">\ud83e\udd5a</span>' +
                    '<div class="card-header">' +
                        '<div class="card-type">Task \u2014 ' + diffLabel + '</div>' +
                        '<div class="card-stars">' + starsStr + '</div>' +
                        '<div class="card-reward">' + c.rewardText + '</div>' +
                    '</div>' +
                    '<div class="card-body"><p>' + c.description + '</p></div>' +
                    '<div class="card-footer">' + cfg.event.branding + ' Easter ' + cfg.event.year + '</div>';
            } else {
                card.className = 'card card-powerup';
                card.innerHTML =
                    '<span class="deco-top-left">\u2728</span>' +
                    '<span class="deco-top-right">\u26a1</span>' +
                    '<span class="deco-bottom-left">\ud83c\udf1f</span>' +
                    '<span class="deco-bottom-right">\u2728</span>' +
                    '<div class="card-header">' +
                        '<div class="card-type">Power-Up</div>' +
                        '<div class="powerup-icon">' + c.icon + '</div>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<div class="powerup-name">' + c.name + '</div>' +
                        '<p>' + c.description + '</p>' +
                    '</div>' +
                    '<div class="card-footer">' + cfg.event.branding + ' Easter ' + cfg.event.year + '</div>';
            }

            pageDiv.appendChild(card);
        });

        // Fill remaining slots with empty cards for grid alignment
        var remaining = cardsPerPage - pageCards.length;
        for (var e = 0; e < remaining; e++) {
            var empty = document.createElement('div');
            empty.className = 'card card-empty';
            pageDiv.appendChild(empty);
        }

        container.appendChild(pageDiv);
    }
});
</script>

</body>
</html>
