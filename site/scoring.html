<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring — Operation: Easter Egg</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <h1><span class="emoji">🥚</span> Operation: Easter Egg <span class="emoji">🥚</span></h1>
        <div class="subtitle">The Skittelling! &mdash; Scoring Board</div>
        <div class="header-actions">
            <button class="btn-header btn-reset" onclick="confirmReset()">Reset All Scores</button>
        </div>
    </header>

    <!-- ==================== PLAYER GRID ==================== -->
    <div class="grid" id="playerGrid"></div>

    <!-- ==================== CROWN THE WINNER ==================== -->
    <div class="winner-section">
        <button class="btn-crown" onclick="crownWinner()">Crown the Winner!</button>
    </div>

    <!-- ==================== FOOTER ==================== -->
    <footer class="footer">
        <span class="rr">An R&amp;R Production</span>
    </footer>

    <!-- ==================== EGG SWAP MODAL ==================== -->
    <div class="modal-overlay" id="swapModal">
        <div class="modal">
            <h2>Egg Swap</h2>
            <p>Transfer Skittles from <strong id="swapFromName"></strong> to another player.</p>
            <label for="swapTarget">Transfer to:</label>
            <select id="swapTarget"></select>
            <label for="swapAmount">Skittles to transfer:</label>
            <input type="number" id="swapAmount" min="1" value="1">
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeSwapModal()">Cancel</button>
                <button class="btn-modal-confirm" onclick="executeSwap()">Swap!</button>
            </div>
        </div>
    </div>

    <!-- ==================== RESET CONFIRM ==================== -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <h3>Reset All Scores?</h3>
            <p>This will clear all scores, power-ups, and saved data. This cannot be undone.</p>
            <div class="confirm-actions">
                <button class="btn-confirm-no" onclick="closeConfirm()">Cancel</button>
                <button class="btn-confirm-yes" onclick="resetAll()">Yes, Reset</button>
            </div>
        </div>
    </div>

    <!-- ==================== WINNER CELEBRATION ==================== -->
    <div class="celebration-overlay" id="celebrationOverlay">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="celebration-content" id="celebrationContent">
            <!-- Populated dynamically -->
        </div>
    </div>

<script src="js/config.js"></script>
<script src="js/scoring.js"></script>
</body>
</html>
